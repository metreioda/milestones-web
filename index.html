<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MilestoneMe – Célèbre chaque instant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07071a;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.18);
      --text: #eeeeff;
      --muted: rgba(220,220,255,0.45);
      --gold: #f5c842;
      --gold-glow: rgba(245,200,66,0.18);
      --purple: #9b59ff;
      --purple-glow: rgba(155,89,255,0.18);
      --green: #3fffaa;
      --green-glow: rgba(63,255,170,0.15);
      --pink: #ff4eb8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 15%, rgba(155,89,255,0.13) 0%, transparent 100%),
        radial-gradient(ellipse 50% 40% at 85% 85%, rgba(63,255,170,0.09) 0%, transparent 100%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(245,200,66,0.04) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    .wrap { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

    /* ─── HERO ─── */
    .hero { text-align: center; padding: 90px 20px 70px; }

    .badge {
      display: inline-block;
      background: var(--purple-glow);
      border: 1px solid rgba(155,89,255,0.35);
      color: var(--purple);
      padding: 5px 18px; border-radius: 100px;
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 900; line-height: 1.08;
      background: linear-gradient(140deg, #fff 0%, rgba(210,210,255,0.75) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 22px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--gold) 0%, var(--purple) 55%, var(--pink) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .hero p { font-size: 1.15rem; color: var(--muted); max-width: 480px; margin: 0 auto 52px; line-height: 1.65; }

    /* ─── FORM CARD ─── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 24px; padding: 36px 40px;
      max-width: 460px; margin: 0 auto;
      backdrop-filter: blur(24px);
    }

    .form-label {
      display: block; font-size: 0.78rem; font-weight: 700;
      color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 10px;
    }

    input[type="date"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border2);
      border-radius: 14px; padding: 15px 18px;
      font-size: 1.05rem; color: var(--text);
      font-family: inherit; margin-bottom: 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
      color-scheme: dark;
    }
    input[type="date"]:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(155,89,255,0.15); }

    .btn-go {
      width: 100%;
      background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
      border: none; border-radius: 14px; padding: 17px;
      font-size: 1.05rem; font-weight: 800; color: #fff;
      cursor: pointer; font-family: inherit; letter-spacing: 0.02em;
      transition: transform 0.18s, opacity 0.18s;
      box-shadow: 0 8px 30px rgba(155,89,255,0.3);
    }
    .btn-go:hover { transform: translateY(-2px); opacity: 0.92; }
    .btn-go:active { transform: translateY(0); }

    /* ─── RESULTS ─── */

    #results.show { display: block; }

      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 30px 20px;
      margin-bottom: 32px;
      backdrop-filter: blur(12px);

      font-size: clamp(1.8rem, 4.5vw, 3rem); font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .stats-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 44px; }
    .stat-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 10px 22px; text-align: center;
      min-width: 130px; backdrop-filter: blur(8px);

    .stat-pill strong {
      display: block; font-size: 1.25rem; font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;

    /* ─── MILESTONE CARDS ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 22px;

      transition: transform 0.2s, border-color 0.2s;

      position: absolute; top: 14px; right: 14px;
      background: linear-gradient(135deg, var(--green), #00d4aa);
      color: #000; font-size: 0.62rem; font-weight: 900;
      padding: 3px 9px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.06em;

    .card-label { font-size: 1rem; font-weight: 800; margin-bottom: 3px; }
    .card-tagline { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
    .card-date { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
    .card-date strong { color: var(--text); font-weight: 600; }

    .countdown {
      font-size: 1.05rem; font-weight: 900;
      color: var(--green); font-variant-numeric: tabular-nums;
      min-height: 1.4em;

    .past-ago  { font-size: 0.78rem; color: var(--muted); }

    .prog-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
    .prog-fill  { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--purple), var(--pink)); transition: width 1.2s ease; }

    .btn-sm {
      font-size: 0.75rem; font-weight: 700; padding: 6px 13px;
      border-radius: 8px; border: 1px solid var(--border2);

    .btn-share:hover { background: rgba(155,89,255,0.22); }

      position: fixed; top: -12px; border-radius: 2px;
      pointer-events: none; z-index: 9999;
      animation: cfall linear forwards;
    }
    @keyframes cfall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(800deg); opacity: 0; }
    }

      .form-card { padding: 24px 22px; }
      .hero { padding: 60px 16px 50px; }
      .grid { grid-template-columns: 1fr; }
      .stat-pill { min-width: 110px; }
    }
  </style>
</head>

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = n => n.toLocaleString('fr-FR');

function fmtAge(ms) {
  const d = Math.floor(ms / 864e5);
  const y = Math.floor(d / 365.25);
  const mo = Math.floor((d % 365.25) / 30.44);
  const dd = Math.floor(d % 30.44);
  const parts = [];
  if (y)  parts.push(`${y} an${y>1?'s':''}`);
  if (mo) parts.push(`${mo} mois`);
  if (dd) parts.push(`${dd} jour${dd>1?'s':''}`);
  return parts.join(', ');
}

function fmtCountdown(ms) {
  if (ms <= 0) return '🎉 C\'est aujourd\'hui !';
  const d = Math.floor(ms / 864e5);
  const h = Math.floor((ms % 864e5)  / 36e5);
  const m = Math.floor((ms % 36e5)   / 6e4);
  const s = Math.floor((ms % 6e4)    / 1e3);
  if (d > 365) return `${Math.floor(d/365)}a ${d%365}j ${h}h ${m}m ${s}s`;
  if (d > 0)   return `${d}j ${h}h ${m}m ${s}s`;
  if (h > 0)   return `${h}h ${m}m ${s}s`;
  if (m > 0)   return `${m}m ${s}s`;
  return `${s}s`;
}

function fmtAgo(ms) {
  const a = Math.abs(ms);
  const d = Math.floor(a / 864e5);
  if (d > 365) return `Il y a ${Math.floor(d/365)} an${Math.floor(d/365)>1?'s':''}`;
  if (d > 0)   return `Il y a ${d} jour${d>1?'s':''}`;
  const h = Math.floor(a / 36e5);
  if (h > 0)   return `Il y a ${h}h`;
  const m = Math.floor(a / 6e4);
  return `Il y a ${m}m`;
}

function fmtDate(dt) {

}

// ── ICS EXPORT ────────────────────────────────────────────────────────────────
function makeICS(events) {
  const pad2 = n => String(n).padStart(2,'0');
  const dateStr = d => `${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}`;
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//MilestoneMe//FR','CALSCALE:GREGORIAN'];
  events.forEach((ev, i) => {
    const ds = dateStr(ev.date);
    lines.push(
      'BEGIN:VEVENT',
      `UID:mm-${i}-${ds}@milestoneme.app`,
      `DTSTART;VALUE=DATE:${ds}`,
      `DTEND;VALUE=DATE:${ds}`,
      `SUMMARY:${ev.m.e} ${ev.m.n} de vie !`,
      `DESCRIPTION:${ev.m.t} — MilestoneMe`,
      'BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY',
      `DESCRIPTION:Demain : ${ev.m.n} de vie !`,
      'END:VALARM','END:VEVENT'
    );
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function downloadICS(events) {
  const blob = new Blob([makeICS(events)], { type:'text/calendar;charset=utf-8' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: 'mes-milestones.ics'
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ── SHARE ─────────────────────────────────────────────────────────────────────
function shareIdx(idx) {
  const item = futureItems[idx];
  const text = `Je vais atteindre ${item.m.n} le ${fmtDate(item.date)} ! ${item.m.e}\nCalcule tes milestones → milestoneme.app`;
  if (navigator.share) navigator.share({ text });
  else navigator.clipboard.writeText(text).then(() => alert('Copié ! 📋'));
}
function sharePast(milestoneJson, dateStr) {
  const m = JSON.parse(milestoneJson);
  const text = `J'ai atteint ${m.n} le ${fmtDate(new Date(dateStr))} ! ${m.e}\nCalcule tes milestones → milestoneme.app`;
  if (navigator.share) navigator.share({ text });
  else navigator.clipboard.writeText(text).then(() => alert('Copié ! 📋'));
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function confetti() {
  const cols = ['#f5c842','#9b59ff','#3fffaa','#ff4eb8','#ffffff','#ff6b6b'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'c-piece';
      const size = 5 + Math.random() * 8;
      p.style.cssText = `
        left:${Math.random()*100}vw;
        width:${size}px; height:${size}px;
        background:${cols[Math.floor(Math.random()*cols.length)]};
        border-radius:${Math.random()>.5?'50%':'3px'};
        animation-duration:${2.2+Math.random()*3}s;
        animation-delay:${Math.random()*0.4}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 6000);
    }, i * 22);
  }
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function renderFutureCard(item, isFirst) {
  const { m, date, diff, idx } = item;
  const total = MS[m.u] * m.v;
  const elapsed = total - diff;
  const pct = Math.min(99, Math.max(1, Math.round(elapsed / total * 100)));

  return `
    <div class="card ${isFirst ? 'next' : 'future'}">
      ${isFirst ? '<div class="next-tag">Prochain !</div>' : ''}
      <div class="card-emoji">${m.e}</div>
      <div class="card-label">${m.n}</div>
      <div class="card-tagline">${m.t}</div>
      <div class="card-date">📅 <strong>${fmtDate(date)}</strong></div>
      <div class="countdown${diff < 864e5*7 ? ' hot' : ''}" id="cd-${idx}">${fmtCountdown(diff)}</div>
      <div class="prog-wrap">
        <div class="prog-meta"><span>Progression</span><span>${pct}%</span></div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="card-btns">
        <button class="btn-sm btn-share" onclick="shareIdx(${idx})">📤 Partager</button>
        <button class="btn-sm btn-cal"   onclick="downloadICS([{m:futureItems[${idx}].m, date:futureItems[${idx}].date}])">📅 Calendrier</button>
      </div>
    </div>`;
}

function renderPastCard(item) {
  const { m, date, diff } = item;
  const mj = JSON.stringify(m).replace(/'/g,"\\'");
  return `
    <div class="card past">
      <div class="card-emoji">${m.e}</div>
      <div class="card-label">${m.n}</div>
      <div class="card-tagline">${m.t}</div>
      <div class="card-date">📅 <strong>${fmtDate(date)}</strong></div>
      <div class="past-done">✅ Accompli — <span class="past-ago">${fmtAgo(diff)}</span></div>
      <div class="card-btns">
        <button class="btn-sm btn-share" onclick="sharePast('${mj.replace(/"/g,"&quot;")}', '${date.toISOString()}')">📤 Partager</button>
      </div>
    </div>`;
}

// ── MAIN CALCULATE ────────────────────────────────────────────────────────────
function calculate() {
  const val = document.getElementById('bd').value;
  if (!val) { alert('Entre ta date de naissance 🎂'); return; }

  const birth = new Date(val + 'T00:00:00');
  if (isNaN(birth)) { alert('Date invalide'); return; }

  const now = new Date();
  if (birth > now) { alert('La date doit être dans le passé ! 😅'); return; }

  // cleanup
  intervals.forEach(clearInterval);
  intervals = [];
  futureItems = [];

  const ageMs = now - birth;

  // compute all
  const all = MILESTONES.map(m => {
    const date = new Date(birth.getTime() + m.v * MS[m.u]);
    const diff = date - now;
    return { m, date, diff, isPast: diff < 0 };
  }).sort((a,b) => a.date - b.date);

  const past   = all.filter(x =>  x.isPast).reverse();
  const future = all.filter(x => !x.isPast).map((x,i) => ({ ...x, idx: i }));
  futureItems = future;

  // ── Age ──
  document.getElementById('age-val').textContent = fmtAge(ageMs);

  // ── Stats ──
  const statsRow = document.getElementById('stats-row');
  const totalS = Math.floor(ageMs/1e3);
  statsRow.innerHTML = `
    <div class="stat-pill"><strong id="live-s">${fmt(totalS)}</strong><span>secondes</span></div>
    <div class="stat-pill"><strong>${fmt(Math.floor(ageMs/6e4))}</strong><span>minutes</span></div>
    <div class="stat-pill"><strong>${fmt(Math.floor(ageMs/36e5))}</strong><span>heures</span></div>
    <div class="stat-pill"><strong>${fmt(Math.floor(ageMs/864e5))}</strong><span>jours</span></div>
    <div class="stat-pill"><strong>${fmt(Math.floor(ageMs/6048e5))}</strong><span>semaines</span></div>
  `;

  // ── ICS all ──
  document.getElementById('ics-all-btn').textContent =
    `📅 Ajouter mes ${Math.min(future.length, 10)} prochains milestones au calendrier`;
  document.getElementById('ics-all-btn').onclick = () =>
    downloadICS(future.slice(0,10).map(x => ({ m: x.m, date: x.date })));

  // ── Future cards ──
  const fSec = document.getElementById('future-section');
  fSec.innerHTML = future.length ? `
    <h2 class="section-head">⏳ Prochains milestones (${future.length})</h2>
    <div class="grid">${future.map((x,i) => renderFutureCard(x, i===0)).join('')}</div>
  ` : '';

  // ── Past cards ──
  const pSec = document.getElementById('past-section');
  pSec.innerHTML = past.length ? `
    <h2 class="section-head">🏅 Milestones accomplis (${past.length})</h2>
    <div class="grid">${past.map(x => renderPastCard(x)).join('')}</div>
  ` : '';

  // show
  const res = document.getElementById('results');
  res.classList.add('show');
  setTimeout(() => res.scrollIntoView({ behavior:'smooth', block:'start' }), 80);

  // ── Live countdowns ──
  future.forEach(item => {
    const el = document.getElementById(`cd-${item.idx}`);
    if (!el) return;
    const tick = () => {
      const d = item.date - new Date();
      el.textContent = fmtCountdown(d);
      el.classList.toggle('hot', d > 0 && d < 864e5 * 7);
    };
    tick();
    intervals.push(setInterval(tick, 1000));
  });

  // ── Live seconds counter ──
  intervals.push(setInterval(() => {
    const el = document.getElementById('live-s');
    if (!el) return;
    el.textContent = fmt(Math.floor((new Date() - birth) / 1e3));
  }, 1000));

  confetti();
}

// Set max date to today
document.getElementById('bd').max = new Date().toISOString().split('T')[0];

// Allow Enter key
document.getElementById('bd').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>
