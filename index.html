<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MilestoneMe – Célèbre chaque instant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="badge">✨ Tes milestones de vie</div>
    <h1>Chaque seconde<br>mérite d'être <em>célébrée</em></h1>
    <p>Entre ta date de naissance et découvre tous tes anniversaires secrets — 10 000 jours, 1 milliard de secondes, et des dizaines d'autres.</p>

    <div class="form-card">
      <div class="form-row">
        <div class="field-group field-group--date">
          <label class="field-label" for="bd">Ta date de naissance</label>
          <input type="date" id="bd" max="" style="margin-bottom:0">
        </div>
        <div class="field-group field-group--time">
          <label class="field-label" for="bt">Heure <span class="field-optional">(optionnel)</span></label>
          <input type="time" id="bt" class="inp-time">
        </div>
      </div>
      <div class="field-group field-group--place" style="margin-bottom: 18px;">
        <label class="field-label" for="bplace">
          Lieu de naissance <span class="field-optional">(optionnel)</span>
        </label>
        <input type="text" id="bplace" list="cities-list" class="inp-place"
               placeholder="Paris, Montréal, Dakar…" autocomplete="off" spellcheck="false">
        <datalist id="cities-list"></datalist>
      </div>
      <div class="personalize-wrap">
        <button class="personalize-toggle" id="personalize-toggle" onclick="togglePersonalize()" type="button" aria-expanded="false" aria-controls="personalize-panel">
          <span>✨ Personnalise ton expérience</span>
          <span class="personalize-chevron" aria-hidden="true">▾</span>
        </button>
        <div class="personalize-panel" id="personalize-panel" role="region" aria-labelledby="personalize-toggle">
          <div class="personalize-inner">
            <div class="field-group" style="margin-bottom: 16px;">
              <label class="field-label" for="pname">Ton prénom <span class="field-optional">(optionnel)</span></label>
              <input type="text" id="pname" class="inp-place" placeholder="Alex, Marie, Jordan…" maxlength="30" autocomplete="given-name" spellcheck="false">
            </div>
            <div class="field-group" style="margin-bottom: 16px;">
              <div class="field-label">Genre <span class="field-optional">(optionnel)</span></div>
              <div class="genre-btns" role="group" aria-label="Sélection du genre">
                <button type="button" class="genre-btn" data-genre="f" onclick="selectGenre(this)">Elle</button>
                <button type="button" class="genre-btn" data-genre="m" onclick="selectGenre(this)">Il</button>
                <button type="button" class="genre-btn" data-genre="n" onclick="selectGenre(this)">Iel</button>
                <button type="button" class="genre-btn" data-genre="" onclick="selectGenre(this)">Passer</button>
              </div>
            </div>
            <div class="field-group">
              <label class="field-label" for="passion">Ta passion principale <span class="field-optional">(optionnel)</span></label>
              <select id="passion" class="inp-select">
                <option value="">— Choisir —</option>
                <option value="musique">🎵 Musique</option>
                <option value="sport">⚽ Sport</option>
                <option value="voyage">✈️ Voyage</option>
                <option value="lecture">📚 Lecture</option>
                <option value="gaming">🎮 Gaming</option>
                <option value="cuisine">🍳 Cuisine</option>
                <option value="art">🎨 Art</option>
                <option value="science">🔬 Science</option>
                <option value="nature">🌿 Nature</option>
                <option value="cinema">🎬 Cinéma</option>
                <option value="autre">✨ Autre</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <button class="btn-go" onclick="calculate()">🚀 Voir mes milestones</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="age-box">
      <div class="lbl">Tu as vécu</div>
      <div class="val" id="age-val"></div>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div id="lifestats-section"></div>
    <div id="planet-section"></div>

    <div id="astro-section"></div>
    <div id="calendars-section"></div>

    <div class="ics-all-wrap">
      <button class="btn-ics-all" id="ics-all-btn">📅 Ajouter mes prochains milestones au calendrier</button>
    </div>

    <div id="future-section"></div>
    <div id="past-section"></div>
  </div>

</div>

<footer>MilestoneMe — Célèbre chaque instant de ta vie 🎉</footer>

<!-- Scripts dans l'ordre de dépendance :
     data.js  → fournit MS, CITIES, MILESTONES, PASSION_FACTS, PLANETS,
                 ZODIAC_TRAITS, MOON_TRAITS, CHINESE_TRAITS, UNIT_LABELS, fmt
     calendars.js → fonctions astro/calendrier (dépend de ZODIAC_TRAITS etc.)
     render.js    → fonctions de rendu HTML (dépend de tout ce qui précède)
     app.js       → logique principale, calculate(), listeners (dépend de tout) -->
<script src="js/data.js"></script>
<script src="js/calendars.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>

</body>
</html>
