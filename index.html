  <link rel="stylesheet" href="css/style.css">
  <!-- Theme init — runs synchronously to set data-theme before first paint, preventing FOUC -->
  <script>
  (function initTheme() {
    var saved = localStorage.getItem('theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var initial = saved || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', initial);

    window.toggleTheme = function() {
      var cur = document.documentElement.getAttribute('data-theme') || 'dark';
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      var btn = document.getElementById('theme-toggle-btn');
      if (btn) btn.setAttribute('aria-pressed', next === 'light');
    };

    // Apply aria-pressed once DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('theme-toggle-btn');
      if (btn) btn.setAttribute('aria-pressed', initial === 'light');
    });
  })();
  </script>
</head>

      <feTurbulence type="fractalNoise" baseFrequency="0.05 0.05" numOctaves="1" seed="1" result="turbulence"/>
      <feGaussianBlur in="turbulence" stdDeviation="2" result="blurredNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="40" xChannelSelector="R" yChannelSelector="B" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="3" result="finalBlur"/>
      <feComposite in="finalBlur" in2="finalBlur" operator="over"/>

</svg>

<!-- Three.js via CDN — chargé en premier pour le shader WebGL -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- Initialisation WebGL Three.js inline — avant les scripts app -->
<script>
(function initHeroCanvas() {
  // Respecter prefers-reduced-motion
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const canvas = document.getElementById('hero-canvas');

  if (prefersReduced || typeof THREE === 'undefined') {
    canvas.style.display = 'none';
    return;
  }

  // Scene minimaliste : plein écran shader via ShaderMaterial sur un plane
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene  = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  const vertexShader = `
    void main() {
      gl_Position = vec4(position, 1.0);
    }
  `;

  const fragmentShader = `
    precision highp float;
    uniform vec2 resolution;
    uniform float time;

    void main() {
      vec2 p = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
      float d = length(p) * 0.05;
      float rx = p.x * (1.0 + d);
      float gx = p.x;
      float bx = p.x * (1.0 - d);
      float r = 0.05 / abs(p.y + sin((rx + time) * 1.0) * 0.5);
      float g = 0.05 / abs(p.y + sin((gx + time) * 1.0) * 0.5);
      float b = 0.05 / abs(p.y + sin((bx + time) * 1.0) * 0.5);
      gl_FragColor = vec4(r * 0.4, g * 0.2, b * 0.8, 1.0);
    }
  `;

  const uniforms = {
    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    time:       { value: 0.0 }
  };

  const geometry = new THREE.PlaneGeometry(2, 2);
  const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms });
  scene.add(new THREE.Mesh(geometry, material));

  let animId = null;
  let startTime = performance.now();
  let running = true;

  function animate() {
    if (!running) return;
    animId = requestAnimationFrame(animate);
    uniforms.time.value = (performance.now() - startTime) * 0.001;
    renderer.render(scene, camera);
  }

  animate();

  // Resize
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
  });

  // Masquer le canvas quand #results est visible
  // On expose une fonction globale appelée par calculate() dans app.js
  window._hideHeroCanvas = function() {
    canvas.style.opacity = '0';
    // Stopper l'animation après la transition pour économiser les ressources
    setTimeout(() => {
      running = false;
      if (animId) cancelAnimationFrame(animId);
    }, 1100);
  };

  window._showHeroCanvas = function() {
    running = true;
    startTime = performance.now() - uniforms.time.value * 1000;
    animate();
    canvas.style.opacity = '1';
  };
})();
</script>

<!-- Dynamic section theming — background change par section -->
<script>
(function initSectionTheming() {
  const sectionThemes = [
    { id: 'planet-section',         theme: 'theme-planets'   },
    { id: 'astro-section',          theme: 'theme-astro'     },
    { id: 'top-milestones-section', theme: 'theme-future'    },
    { id: 'future-section',         theme: 'theme-future'    },
    { id: 'past-section',           theme: 'theme-past'      },
    { id: 'lifestats-section',      theme: 'theme-life'      },
    { id: 'calendars-section',      theme: 'theme-calendars' },
    { id: 'season-events-section',  theme: 'theme-seasons'   },
  ];
  const allThemes = sectionThemes.map(s => s.theme);
  allThemes.push('theme-hero');
  let current = 'theme-hero';
  document.body.classList.add('theme-hero');

  function setTheme(t) {
    if (t === current) return;
    current = t;
    document.body.classList.remove(...allThemes);
    document.body.classList.add(t);
  }

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const found = sectionThemes.find(s => s.id === e.target.id);
        if (found) setTheme(found.theme);
      }
    });
  }, { threshold: 0.15, rootMargin: '-10% 0px -60% 0px' });

  const heroEl = document.querySelector('.hero');
  if (heroEl) {
    new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) setTheme('theme-hero');
    }, { threshold: 0.3 }).observe(heroEl);
  }

  window.observeThemeSections = function() {
    sectionThemes.forEach(({ id }) => {
      const el = document.getElementById(id);
      if (el) obs.observe(el);
    });
  };
})();
</script>

<!-- Scroll reveal via IntersectionObserver — après app.js -->
<script>
(function initScrollReveal() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

  // Exposé globalement pour que calculate() puisse l'appeler
  window.observeRevealSections = function() {
    document.querySelectorAll('.reveal-section').forEach(el => observer.observe(el));
  };
})();
</script>

<!-- Cosmic background — twinkling stars, floating planets, shooting stars -->
<script>
(function initCosmicBg() {
  // Respect prefers-reduced-motion: skip all animations, render nothing
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const starsEl   = document.getElementById('cosmic-stars');
  const planetsEl = document.getElementById('cosmic-planets');
  const shootEl   = document.getElementById('cosmic-shooters');
  if (!starsEl || !planetsEl || !shootEl) return;

  // ── Seeded pseudo-random so layout is deterministic per session ──────────
  let seed = 0x9e3779b9;
  function rand() {
    seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5;
    return (seed >>> 0) / 0xffffffff;
  }

  // ── STARS ────────────────────────────────────────────────────────────────
  // Three size tiers: micro (1px), small (1.5px), medium (2px)
  const STAR_COUNT = 180;
  const starFrag = document.createDocumentFragment();

  for (let i = 0; i < STAR_COUNT; i++) {
    const s = document.createElement('span');
    const x = rand() * 100;         // vw %
    const y = rand() * 100;         // vh %
    const tier = rand();
    // Size + opacity by tier
    let size, baseOpacity;
    if (tier < 0.60) {
      size = 1;   baseOpacity = 0.25 + rand() * 0.20;  // micro, faint
    } else if (tier < 0.88) {
      size = 1.5; baseOpacity = 0.35 + rand() * 0.25;  // small
    } else {
      size = 2;   baseOpacity = 0.45 + rand() * 0.30;  // medium, brighter
    }

    // Twinkle: random duration 2–6s, random delay 0–4s, random easing via class
    const dur  = (2 + rand() * 4).toFixed(2);
    const del  = (rand() * 4).toFixed(2);
    // Slight warm/cool tint variety
    const tints = ['255,255,255', '220,230,255', '255,245,220', '200,220,255'];
    const tint  = tints[Math.floor(rand() * tints.length)];

    s.className = 'cstar';
    s.style.cssText = [
      `left:${x.toFixed(2)}vw`,
      `top:${y.toFixed(2)}vh`,
      `width:${size}px`,
      `height:${size}px`,
      `background:rgba(${tint},${baseOpacity.toFixed(2)})`,
      `animation-duration:${dur}s`,
      `animation-delay:-${del}s`,   // negative delay = starts mid-cycle
    ].join(';');

    starFrag.appendChild(s);
  }
  starsEl.appendChild(starFrag);

  // ── PLANETS ──────────────────────────────────────────────────────────────
  // 5 subtle drifting orbs, each with unique color + size + path
  const PLANET_DEFS = [
    { size: 28, color: '99,102,241',  opacity: 0.18, x: 8,  y: 18, dur: 22, del: 0  },  // indigo
    { size: 18, color: '139,92,246',  opacity: 0.14, x: 78, y: 12, dur: 28, del: 6  },  // violet
    { size: 22, color: '6,182,212',   opacity: 0.12, x: 88, y: 62, dur: 25, del: 3  },  // cyan
    { size: 14, color: '245,158,11',  opacity: 0.16, x: 22, y: 74, dur: 30, del: 12 },  // amber
    { size: 10, color: '244,63,94',   opacity: 0.12, x: 60, y: 85, dur: 20, del: 8  },  // rose
  ];

  PLANET_DEFS.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'cplanet';

    // Drift amplitude: each planet moves a small amount (set via CSS custom props)
    const driftX = 10 + Math.floor(rand() * 14);   // px
    const driftY = 8  + Math.floor(rand() * 10);
    const driftDur = p.dur;

    el.style.cssText = [
      `left:${p.x}vw`,
      `top:${p.y}vh`,
      `width:${p.size}px`,
      `height:${p.size}px`,
      // Layered: solid core glow + outer halo via box-shadow
      `background:radial-gradient(circle at 35% 35%, rgba(${p.color},${(p.opacity * 1.8).toFixed(2)}), rgba(${p.color},${p.opacity.toFixed(2)}) 60%, transparent 100%)`,
      `box-shadow:0 0 ${p.size * 1.8}px ${p.size * 0.6}px rgba(${p.color},${(p.opacity * 0.5).toFixed(2)})`,
      `--dx:${driftX}px`,
      `--dy:${driftY}px`,
      `animation-duration:${driftDur}s`,
      `animation-delay:-${p.del}s`,
    ].join(';');

    planetsEl.appendChild(el);
  });

  // ── SHOOTING STARS ───────────────────────────────────────────────────────
  // Spawn one shooting star every 5-9s; remove it after animation ends
  function spawnShooter() {
    const el = document.createElement('div');
    el.className = 'cshooter';

    // Random start position along top/left edges
    const side = rand() < 0.7 ? 'top' : 'left';   // mostly from top
    let startX, startY;
    if (side === 'top') {
      startX = 10 + rand() * 60;   // 10–70vw
      startY = -2;
    } else {
      startX = -2;
      startY = 5 + rand() * 40;    // 5–45vh
    }

    // Angle: diagonal downward-right, slight variation ±15deg
    const angle = 25 + rand() * 30;   // 25–55deg below horizontal
    const length = 80 + rand() * 120; // px tail length
    const dur = (0.5 + rand() * 0.4).toFixed(2);  // 0.5–0.9s

    // Bright white/blue-white head, fading tail
    const brightness = 0.7 + rand() * 0.3;

    el.style.cssText = [
      `left:${startX}vw`,
      `top:${startY}vh`,
      `width:${length}px`,
      `--angle:${angle}deg`,
      `--shoot-opacity:${brightness.toFixed(2)}`,
      `animation-duration:${dur}s`,
    ].join(';');

    shootEl.appendChild(el);

    // Clean up after animation completes
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }

  // Initial burst: 2 shooters at load
  setTimeout(spawnShooter, 2000);
  setTimeout(spawnShooter, 4500);

  // Recurring: every 5–9s
  function scheduleNext() {
    const wait = 5000 + rand() * 4000;
    setTimeout(() => {
      spawnShooter();
      scheduleNext();
    }, wait);
  }
  scheduleNext();
})();
</script>
