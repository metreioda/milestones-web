<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MilestoneMe – Célèbre chaque instant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060614;
      --bg2: #0d0d24;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.08);
      --surface3: rgba(255,255,255,0.12);
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.15);
      --border3: rgba(255,255,255,0.25);
      --text: #f0f0ff;
      --text2: #c8c8e8;
      --muted: rgba(200,200,240,0.45);
      --gold: #f5c842;
      --gold-dim: rgba(245,200,66,0.12);
      --purple: #9b59ff;
      --purple-dim: rgba(155,89,255,0.12);
      --purple-glow: rgba(155,89,255,0.22);
      --green: #3fffaa;
      --green-dim: rgba(63,255,170,0.10);
      --pink: #ff4eb8;
      --pink-dim: rgba(255,78,184,0.10);
      --cyan: #38d9f5;
      --radius-card: 20px;
      --radius-pill: 100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    @keyframes bgshift {
      0%   { opacity: 1; }
      50%  { opacity: 0.7; }
      100% { opacity: 1; }
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 10% 10%, rgba(155,89,255,0.16) 0%, transparent 70%),
        radial-gradient(ellipse 55% 45% at 90% 85%, rgba(63,255,170,0.11) 0%, transparent 70%),
        radial-gradient(ellipse 45% 40% at 50% 50%, rgba(245,200,66,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 80% 15%, rgba(56,217,245,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 35% 30% at 20% 80%, rgba(255,78,184,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: bgshift 8s ease-in-out infinite;
    }

    .wrap { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

    /* ─── HERO ─── */
    .hero { text-align: center; padding: 90px 20px 70px; }

    .badge {
      display: inline-block;
      background: var(--purple-glow);
      border: 1px solid rgba(155,89,255,0.35);
      color: var(--purple);
      padding: 5px 18px; border-radius: 100px;
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 900; line-height: 1.08;
      background: linear-gradient(140deg, #fff 0%, rgba(210,210,255,0.75) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 22px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--gold) 0%, var(--purple) 55%, var(--pink) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .hero p { font-size: 1.15rem; color: var(--muted); max-width: 480px; margin: 0 auto 52px; line-height: 1.65; }

    /* ─── FORM CARD ─── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 24px; padding: 36px 40px;
      max-width: 460px; margin: 0 auto;
      backdrop-filter: blur(24px);
    }

    .form-label {
      display: block; font-size: 0.78rem; font-weight: 700;
      color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 10px;
    }

    input[type="date"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border2);
      border-radius: 14px; padding: 15px 18px;
      font-size: 1.05rem; color: var(--text);
      font-family: inherit; margin-bottom: 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
      color-scheme: dark;
    }
    input[type="date"]:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(155,89,255,0.15); }

    .btn-go {
      width: 100%;
      background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
      border: none; border-radius: 14px; padding: 17px;
      font-size: 1.05rem; font-weight: 800; color: #fff;
      cursor: pointer; font-family: inherit; letter-spacing: 0.02em;
      transition: transform 0.18s, opacity 0.18s;
      box-shadow: 0 8px 30px rgba(155,89,255,0.3);
    }
    .btn-go:hover { transform: translateY(-2px); opacity: 0.92; }
    .btn-go:active { transform: translateY(0); }

    /* ─── RESULTS ─── */
    #results { display: none; padding: 40px 0 80px; }
    #results.show { display: block; }

    .age-box {
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 30px 20px;
      margin-bottom: 32px;
      backdrop-filter: blur(12px);
    }
    .age-box .lbl { font-size: 0.78rem; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .age-box .val {
      font-size: clamp(1.8rem, 4.5vw, 3rem); font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .stats-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 44px; }
    .stat-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-pill); padding: 10px 22px; text-align: center;
      min-width: 130px; backdrop-filter: blur(8px);
    }
    .stat-pill strong {
      display: block; font-size: 1.25rem; font-weight: 900;
      font-variant-numeric: tabular-nums;
    }
    .stat-pill span { font-size: 0.78rem; color: var(--muted); font-weight: 600; }

    /* Stat pill per-unit gradient colors */
    .stat-pill.s-pill strong { background: linear-gradient(135deg, #ff7070, #ff4eb8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-pill.m-pill strong { background: linear-gradient(135deg, #38d9f5, #38a8f5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-pill.h-pill strong { background: linear-gradient(135deg, #f5c842, #f5a828); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-pill.d-pill strong { background: linear-gradient(135deg, #3fffaa, #00d4aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-pill.w-pill strong { background: linear-gradient(135deg, #9b59ff, #c459ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .ics-all-wrap { text-align: center; margin-bottom: 52px; }
    .btn-ics-all {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 14px; padding: 14px 30px;
      color: var(--text); font-family: inherit;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s; display: inline-flex; align-items: center; gap: 10px;
    }
    .btn-ics-all:hover { background: var(--surface2); transform: translateY(-2px); }

    .section-head {
      font-size: 1.25rem; font-weight: 800; margin-bottom: 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Compact section-head variant used inside astro/calendars sections */
    .section-head.compact {
      font-size: 1rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin: 0 0 16px;
    }

    /* ─── UNIT BAND ─── */
    .card-unit-band {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .unit-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; padding: 3px 8px;
      border-radius: 6px; white-space: nowrap;
    }
    .unit-tag.s { background: rgba(255,78,78,0.12);  color: #ff7070; border: 1px solid rgba(255,78,78,0.2); }
    .unit-tag.m { background: rgba(56,217,245,0.12); color: #38d9f5; border: 1px solid rgba(56,217,245,0.2); }
    .unit-tag.h { background: rgba(245,200,66,0.12); color: #f5c842; border: 1px solid rgba(245,200,66,0.2); }
    .unit-tag.d { background: rgba(63,255,170,0.12); color: #3fffaa; border: 1px solid rgba(63,255,170,0.2); }
    .unit-tag.w { background: rgba(155,89,255,0.12); color: #9b59ff; border: 1px solid rgba(155,89,255,0.2); }

    /* ─── ASTRO BOX ─── */
    .astro-box {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 36px;
    }
    .astro-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 20px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
      backdrop-filter: blur(10px);
    }
    .astro-card:hover { transform: translateY(-2px); border-color: var(--border2); }
    .astro-card.western { border-color: rgba(245,200,66,0.2);  background: linear-gradient(140deg, rgba(245,200,66,0.04),  var(--surface)); }
    .astro-card.moon    { border-color: rgba(155,89,255,0.2);  background: linear-gradient(140deg, rgba(155,89,255,0.04),  var(--surface)); }
    .astro-card.chinese { border-color: rgba(255,78,78,0.2);   background: linear-gradient(140deg, rgba(255,78,78,0.04),   var(--surface)); }
    .astro-emoji { font-size: 2.4rem; margin-bottom: 8px; }
    .astro-type  { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; }
    .astro-name  { font-size: 1.15rem; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .astro-sub   { font-size: 0.75rem; color: var(--muted); }

    /* ─── CALENDARS GRID ─── */
    .calendars-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      margin-bottom: 48px;
    }
    .cal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 20px;
      display: flex; align-items: flex-start; gap: 14px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .cal-card:hover { transform: translateY(-2px); border-color: var(--border2); }
    .cal-flag { font-size: 2rem; flex-shrink: 0; line-height: 1; }
    .cal-body { flex: 1; min-width: 0; }
    .cal-type { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3px; }
    .cal-date { font-size: 1rem; font-weight: 700; color: var(--text); }
    .cal-note { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none !important; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 48px;
    }
    @media (min-width: 900px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ─── MILESTONE CARDS ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card); padding: 22px;
      position: relative; overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      animation: cardIn 0.4s ease both;
    }
    /* Progressive delay applied via inline style in JS */
    .card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }

    .card.future { border-color: rgba(155,89,255,0.22); background: linear-gradient(140deg, rgba(155,89,255,0.06), var(--surface)); }
    .card.past   { border-color: rgba(245,200,66,0.22);  background: linear-gradient(140deg, rgba(245,200,66,0.06), var(--surface)); }
    .card.next   { border-color: rgba(63,255,170,0.45);  background: linear-gradient(140deg, rgba(63,255,170,0.08), var(--surface)); box-shadow: 0 0 30px rgba(63,255,170,0.07); }

    .next-tag {
      position: absolute; top: 14px; right: 14px;
      background: linear-gradient(135deg, var(--green), #00d4aa);
      color: #000; font-size: 0.62rem; font-weight: 900;
      padding: 3px 9px; border-radius: 100px; text-transform: uppercase; letter-spacing: 0.06em;
    }

    .card-emoji { font-size: 2.1rem; margin-bottom: 10px; }
    .card-label { font-size: 1rem; font-weight: 800; margin-bottom: 3px; }
    .card-tagline { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
    .card-date { font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
    .card-date strong { color: var(--text); font-weight: 600; }

    .countdown {
      font-size: 1.05rem; font-weight: 900;
      color: var(--green); font-variant-numeric: tabular-nums;
      min-height: 1.4em;
    }
    .countdown.hot { color: var(--pink); animation: blink 0.9s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.65} }

    .past-done { font-size: 0.82rem; font-weight: 700; color: var(--gold); }
    .past-ago  { font-size: 0.78rem; color: var(--muted); }

    .prog-wrap { margin-top: 13px; }
    .prog-meta { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; }
    .prog-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
    .prog-fill  { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--purple), var(--pink)); transition: width 1.2s ease; }

    .card-btns { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .btn-sm {
      font-size: 0.75rem; font-weight: 700; padding: 6px 13px;
      border-radius: 8px; border: 1px solid var(--border2);
      cursor: pointer; font-family: inherit; transition: all 0.18s;
    }
    .btn-share { background: rgba(155,89,255,0.1); color: var(--purple); border-color: rgba(155,89,255,0.3); }
    .btn-share:hover { background: rgba(155,89,255,0.22); }
    .btn-cal { background: rgba(63,255,170,0.1); color: var(--green); border-color: rgba(63,255,170,0.3); }
    .btn-cal:hover { background: rgba(63,255,170,0.2); }

    /* ─── CONFETTI ─── */
    .c-piece {
      position: fixed; top: -12px; border-radius: 2px;
      pointer-events: none; z-index: 9999;
      animation: cfall linear forwards;
    }
    @keyframes cfall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(800deg); opacity: 0; }
    }

    /* ─── PROFIL ASTRAL ÉTENDU ─── */
    .astro-profile-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin: 0 0 12px;
      padding: 14px 24px;
      background: linear-gradient(135deg, rgba(155,89,255,0.10), rgba(255,78,184,0.08));
      border: 1px solid rgba(155,89,255,0.28);
      border-radius: 14px;
      color: var(--text2);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.22s;
      text-align: center;
      letter-spacing: 0.01em;
    }
    .astro-profile-btn::after {
      content: '▾';
      font-size: 1rem;
      line-height: 1;
      transition: transform 0.3s ease;
      opacity: 0.55;
      margin-left: 2px;
    }
    .astro-profile-btn.open::after {
      transform: rotate(180deg);
    }
    .astro-profile-btn:hover {
      background: linear-gradient(135deg, rgba(155,89,255,0.18), rgba(255,78,184,0.14));
      border-color: rgba(155,89,255,0.5);
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(155,89,255,0.14);
    }
    .astro-profile-btn.open {
      border-color: rgba(155,89,255,0.45);
      background: linear-gradient(135deg, rgba(155,89,255,0.15), rgba(255,78,184,0.11));
      color: var(--text);
    }

    .astro-profile-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
      opacity: 0;
      margin-bottom: 0;
    }
    .astro-profile-panel.open {
      max-height: 900px;
      opacity: 1;
      margin-bottom: 36px;
    }

    .astro-profile-inner {
      background: linear-gradient(140deg, rgba(155,89,255,0.07), rgba(255,78,184,0.05), rgba(245,200,66,0.04));
      border: 1px solid rgba(155,89,255,0.2);
      border-radius: 20px;
      padding: 28px 30px;
    }
    .astro-profile-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .astro-profile-sigils {
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .astro-profile-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 2px;
    }
    .astro-profile-subtitle {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }
    .astro-profile-body {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--text2);
    }
    .astro-profile-body p {
      margin-bottom: 10px;
    }
    .astro-profile-body p:last-child {
      margin-bottom: 0;
    }
    .astro-profile-body em {
      font-style: normal;
      color: var(--purple);
      font-weight: 600;
    }
    .astro-profile-disclaimer {
      margin-top: 18px;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      font-style: italic;
    }

    /* ─── FOOTER ─── */
    footer {
      text-align: center; padding: 36px 20px;
      color: var(--muted); font-size: 0.82rem;
      border-top: 1px solid var(--border); position: relative; z-index: 1;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .form-card { padding: 24px 22px; }
      .hero { padding: 60px 16px 50px; }
      .grid { grid-template-columns: 1fr; }
      .stat-pill { min-width: 110px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="badge">✨ Tes milestones de vie</div>
    <h1>Chaque seconde<br>mérite d'être <em>célébrée</em></h1>
    <p>Entre ta date de naissance et découvre tous tes anniversaires secrets — 10 000 jours, 1 milliard de secondes, et des dizaines d'autres.</p>

    <div class="form-card">
      <label class="form-label" for="bd">Ta date de naissance</label>
      <input type="date" id="bd" max="">
      <button class="btn-go" onclick="calculate()">🚀 Voir mes milestones</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="age-box">
      <div class="lbl">Tu as vécu</div>
      <div class="val" id="age-val"></div>
    </div>

    <div class="stats-row" id="stats-row"></div>

    <div id="astro-section"></div>
    <div id="calendars-section"></div>

    <div class="ics-all-wrap">
      <button class="btn-ics-all" id="ics-all-btn">📅 Ajouter mes prochains milestones au calendrier</button>
    </div>

    <div id="future-section"></div>
    <div id="past-section"></div>
  </div>

</div>

<footer>MilestoneMe — Célèbre chaque instant de ta vie 🎉</footer>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const MS = { s: 1e3, m: 6e4, h: 36e5, d: 864e5, w: 6048e5 };

const MILESTONES = [
  // ── SECONDES ──
  { v: 1e8,        u:'s', e:'⚡', n:'100 000 000 secondes',     t:'Cent millions de secondes !' },
  { v: 111111111,  u:'s', e:'🔮', n:'111 111 111 secondes',     t:'Le chiffre miroir' },
  { v: 2e8,        u:'s', e:'✨', n:'200 000 000 secondes',     t:'Deux cents millions !' },
  { v: 222222222,  u:'s', e:'👯', n:'222 222 222 secondes',     t:'La paire parfaite' },
  { v: 3e8,        u:'s', e:'🎯', n:'300 000 000 secondes',     t:'Trois cents millions !' },
  { v: 333333333,  u:'s', e:'🎲', n:'333 333 333 secondes',     t:'Triple répétition magique' },
  { v: 4e8,        u:'s', e:'💪', n:'400 000 000 secondes',     t:'Quatre cents millions !' },
  { v: 444444444,  u:'s', e:'🏠', n:'444 444 444 secondes',     t:'Les quatre alignés' },

const fmt = n => n.toLocaleString('fr-FR');

function fmtAge(ms) {
  const d = Math.floor(ms / 864e5);
  const y = Math.floor(d / 365.25);
  const mo = Math.floor((d % 365.25) / 30.44);
  const dd = Math.floor(d % 30.44);
  const parts = [];
  if (y)  parts.push(`${y} an${y>1?'s':''}`);
  if (mo) parts.push(`${mo} mois`);
  if (dd) parts.push(`${dd} jour${dd>1?'s':''}`);
  return parts.join(', ');
}

function fmtCountdown(ms) {
  if (ms <= 0) return '🎉 C\'est aujourd\'hui !';
  const d = Math.floor(ms / 864e5);
  const h = Math.floor((ms % 864e5)  / 36e5);
  const m = Math.floor((ms % 36e5)   / 6e4);
  const s = Math.floor((ms % 6e4)    / 1e3);
  if (d > 365) return `${Math.floor(d/365)}a ${d%365}j ${h}h ${m}m ${s}s`;
  if (d > 0)   return `${d}j ${h}h ${m}m ${s}s`;
  if (h > 0)   return `${h}h ${m}m ${s}s`;
  if (m > 0)   return `${m}m ${s}s`;
  return `${s}s`;
}

function fmtAgo(ms) {
  const a = Math.abs(ms);
  const d = Math.floor(a / 864e5);
  if (d > 365) return `Il y a ${Math.floor(d/365)} an${Math.floor(d/365)>1?'s':''}`;
  if (d > 0)   return `Il y a ${d} jour${d>1?'s':''}`;
  const h = Math.floor(a / 36e5);
  if (h > 0)   return `Il y a ${h}h`;
  const m = Math.floor(a / 6e4);
  return `Il y a ${m}m`;
}

function fmtDate(dt) {
  return dt.toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

// ── ICS EXPORT ────────────────────────────────────────────────────────────────
function makeICS(events) {
  const pad2 = n => String(n).padStart(2,'0');
  const dateStr = d => `${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}`;
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//MilestoneMe//FR','CALSCALE:GREGORIAN'];
  events.forEach((ev, i) => {
    const ds = dateStr(ev.date);
    lines.push(
      'BEGIN:VEVENT',
      `UID:mm-${i}-${ds}@milestoneme.app`,
      `DTSTART;VALUE=DATE:${ds}`,
      `DTEND;VALUE=DATE:${ds}`,
      `SUMMARY:${ev.m.e} ${ev.m.n} de vie !`,
      `DESCRIPTION:${ev.m.t} — MilestoneMe`,
      'BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY',
      `DESCRIPTION:Demain : ${ev.m.n} de vie !`,
      'END:VALARM','END:VEVENT'
    );
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function downloadICS(events) {
  const blob = new Blob([makeICS(events)], { type:'text/calendar;charset=utf-8' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: 'mes-milestones.ics'
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ── CALENDRIERS ALTERNATIFS ───────────────────────────────────────────────────
function gregorianToJD(year, month, day) {
  if (month <= 2) { year -= 1; month += 12; }
  const A = Math.floor(year / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + B - 1524.5;
}

function jdToHijri(jd) {
  const z = Math.floor(jd) - 1948438 + 32167;
  const era = Math.floor((30 * z + 29) / 10631);
  const remaining = z - Math.floor((10631 * era) / 30);
  const month = Math.min(12, Math.floor((11 * remaining + 330) / 325));
  const day = remaining - Math.floor((325 * month - 320) / 11);
  return {
    year: era, month, day,
    monthName: ['','Muharram','Safar','Rabi I','Rabi II','Joumada I','Joumada II','Rajab',"Sha'ban",'Ramadan','Chawwal','Dhou al-Qi\'da','Dhou al-Hijja'][month]
  };
}

function toRoman(n) {
  const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
  const syms = ['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
  let r = '';
  for (let i = 0; i < vals.length; i++) while (n >= vals[i]) { r += syms[i]; n -= vals[i]; }
  return r;
}

function gregorianToFrenchRevolutionary(year, month, day) {
  const MOIS = ['Vendémiaire','Brumaire','Frimaire','Nivôse','Pluviôse','Ventôse','Germinal','Floréal','Prairial','Messidor','Thermidor','Fructidor'];
  const JOURS_COMPL = ['Vertu','Génie','Travail','Opinion','Récompenses','Révolution'];
  const EPOCH_JD = 2375839.5;
  const jd = gregorianToJD(year, month, day);
  const elapsed = jd - EPOCH_JD;
  if (elapsed < 0) return { display: 'Avant la République', hypothetical: true };
  const an = Math.floor(elapsed / 365.24219) + 1;
  const jourDansAnnee = Math.floor(elapsed % 365.24219);
  if (jourDansAnnee >= 360) {
    const jc = jourDansAnnee - 360;
    return { display: `${JOURS_COMPL[jc] || 'J.C.'} An ${toRoman(an)}`, hypothetical: false };
  }
  const moisIdx = Math.floor(jourDansAnnee / 30);
  const jour = (jourDansAnnee % 30) + 1;
  return { display: `${jour} ${MOIS[moisIdx]} An ${toRoman(an)}`, hypothetical: false };
}

function gregorianToEthiopian(year, month, day) {
  const ETH_MONTHS = ['','Meskerem','Tikimt','Hidar','Tahsas','Tir','Yekatit','Megabit','Miazia','Ginbot','Sene','Hamle','Nehase','Pagumé'];
  const ETH_EPOCH = 1724220.5;
  const jd = gregorianToJD(year, month, day);
  const r = (jd - ETH_EPOCH) % 1461;
  const n = (r % 365) + 365 * Math.floor(r / 1460);
  const ethYear  = 4 * Math.floor((jd - ETH_EPOCH) / 1461) + Math.floor(r / 365) + 1;
  const ethMonth = Math.min(13, Math.floor(n / 30) + 1);
  const ethDay   = (n % 30) + 1;
  return { display: `${ethDay} ${ETH_MONTHS[ethMonth]} ${ethYear}` };
}

function gregorianToJalali(gy, gm, gd) {
  const MONTHS = ['','Farvardin','Ordibehesht','Khordad','Tir','Mordad','Shahrivar','Mehr','Aban','Azar','Dey','Bahman','Esfand'];
  function div(a, b) { return Math.floor(a / b); }
  const g_d_no = 365 * gy + div(gy + 3, 4) - div(gy + 99, 100) + div(gy + 399, 400);
  const gm_arr = [0, 31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
  let d_no = g_d_no;
  for (let i = 1; i < gm; i++) d_no += gm_arr[i];
  if (gm > 2 && ((gy % 4 === 0 && gy % 100 !== 0) || gy % 400 === 0)) d_no++;
  d_no += gd;
  const j_d_no = d_no - 79;
  const j_np = div(j_d_no - 1, 12053);
  let jdn = (j_d_no - 1) % 12053;
  let jy = 979 + 33 * j_np + 4 * div(jdn, 1461);
  jdn %= 1461;
  if (jdn >= 366) { jy += div(jdn - 1, 365); jdn = (jdn - 1) % 365; }
  const j_m_arr = [31, 31, 31, 31, 31, 31, 30, 30, 30, 30, 30, 29];
  let jm = 0;
  for (; jm < 11 && jdn >= j_m_arr[jm]; jm++) jdn -= j_m_arr[jm];
  return { display: `${jdn + 1} ${MONTHS[jm + 1]} ${jy}` };
}

function gregorianToJulian(year, month, day) {
  const MONTHS_FR = ['','janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const jd = gregorianToJD(year, month, day);
  const z = Math.floor(jd + 0.5);
  const b = z + 1524;
  const c = Math.floor((b - 122.1) / 365.25);
  const dd = Math.floor(365.25 * c);
  const e = Math.floor((b - dd) / 30.6001);
  const julianDay   = b - dd - Math.floor(30.6001 * e);
  const julianMonth = e < 14 ? e - 1 : e - 13;
  const julianYear  = julianMonth > 2 ? c - 4716 : c - 4715;
  return { display: `${julianDay} ${MONTHS_FR[julianMonth]} ${julianYear}` };
}

function generateAstralDescription(zodiacName, moonSignName, chineseAnimal) {
  const z = ZODIAC_TRAITS[zodiacName];
  const mo = MOON_TRAITS[moonSignName];
  const ch = CHINESE_TRAITS[chineseAnimal];

  // Fallback si un signe n'est pas trouvé (ne devrait pas arriver)
  if (!z || !mo || !ch) return '<p>Les astres refusent de se prononcer pour le moment.</p>';

  const sentences = [
    `En apparence, tu es <em>${z.core}</em> — avec <em>${z.shadow}</em>.`,
    `Intérieurement, ta Lune en ${moonSignName} révèle que tu <em>${mo.core}</em>, et qu'en amour, tu <em>${mo.love}</em>.`,
    `Mais c'est ton côté <em>${chineseAnimal}</em> qui te trahit vraiment : <em>${ch.core}</em>, avec pour défaut principal <em>${ch.shadow}</em>.`,
    `Résultat ? <em>${z.style}</em> — et ${ch.love}.`,
  ];

  return sentences.map(s => `<p>${s}</p>`).join('');
}

function toggleAstralProfile() {
  const btn   = document.getElementById('astro-profile-btn');
  const label = document.getElementById('astro-profile-btn-label');
  const panel = document.getElementById('astro-profile-panel');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  label.textContent = isOpen ? '🔮 En savoir plus sur mon profil astral' : '✨ Masquer mon profil astral';
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function renderFutureCard(item, isFirst) {
  const { m, date, diff, idx } = item;
  const total = MS[m.u] * m.v;
  const elapsed = total - diff;
  const pct = Math.min(99, Math.max(1, Math.round(elapsed / total * 100)));

  const delay = Math.min(idx * 40, 400);
  return `
    <div class="card ${isFirst ? 'next' : 'future'}" style="animation-delay:${delay}ms">
      ${isFirst ? '<div class="next-tag">Prochain !</div>' : ''}
      <div class="card-emoji">${m.e}</div>
      ${unitBand(m.u)}
      <div class="card-label">${m.n}</div>
      <div class="card-tagline">${m.t}</div>
      <div class="card-date">📅 <strong>${fmtDate(date)}</strong></div>
      <div class="countdown${diff < 864e5*7 ? ' hot' : ''}" id="cd-${idx}">${fmtCountdown(diff)}</div>
      <div class="prog-wrap">
        <div class="prog-meta"><span>Progression</span><span>${pct}%</span></div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="card-btns">
        <button class="btn-sm btn-share" onclick="shareIdx(${idx})">📤 Partager</button>
        <button class="btn-sm btn-cal"   onclick="downloadICS([{m:futureItems[${idx}].m, date:futureItems[${idx}].date}])">📅 Calendrier</button>
      </div>
    </div>`;
}

function renderPastCard(item, cardIdx) {
  const { m, date, diff } = item;
  const mj = JSON.stringify(m).replace(/'/g,"\\'");
  const delay = Math.min((cardIdx || 0) * 40, 400);
  return `
    <div class="card past" style="animation-delay:${delay}ms">
      <div class="card-emoji">${m.e}</div>
      ${unitBand(m.u)}
      <div class="card-label">${m.n}</div>
      <div class="card-tagline">${m.t}</div>
      <div class="card-date">📅 <strong>${fmtDate(date)}</strong></div>
      <div class="past-done">✅ Accompli — <span class="past-ago">${fmtAgo(diff)}</span></div>
      <div class="card-btns">
        <button class="btn-sm btn-share" onclick="sharePast('${mj.replace(/"/g,"&quot;")}', '${date.toISOString()}')">📤 Partager</button>
      </div>
    </div>`;
}

// ── MAIN CALCULATE ────────────────────────────────────────────────────────────
function calculate() {
  const val = document.getElementById('bd').value;
  if (!val) { alert('Entre ta date de naissance 🎂'); return; }

  const birth = new Date(val + 'T00:00:00');
  if (isNaN(birth)) { alert('Date invalide'); return; }

  const now = new Date();
  if (birth > now) { alert('La date doit être dans le passé ! 😅'); return; }

  // cleanup
  intervals.forEach(clearInterval);
  intervals = [];
  futureItems = [];

  const ageMs = now - birth;

  // compute all
  const all = MILESTONES.map(m => {
    const date = new Date(birth.getTime() + m.v * MS[m.u]);
    const diff = date - now;
    return { m, date, diff, isPast: diff < 0 };
  }).sort((a,b) => a.date - b.date);

  const past   = all.filter(x =>  x.isPast).reverse();
  const future = all.filter(x => !x.isPast).map((x,i) => ({ ...x, idx: i }));
  futureItems = future;

  // ── Age ──
  document.getElementById('age-val').textContent = fmtAge(ageMs);

  // ── Stats ──
  const statsRow = document.getElementById('stats-row');
  const totalS = Math.floor(ageMs/1e3);
  statsRow.innerHTML = `
    <div class="stat-pill s-pill"><strong id="live-s">${fmt(totalS)}</strong><span>⚡ secondes</span></div>
    <div class="stat-pill m-pill"><strong>${fmt(Math.floor(ageMs/6e4))}</strong><span>⏰ minutes</span></div>
    <div class="stat-pill h-pill"><strong>${fmt(Math.floor(ageMs/36e5))}</strong><span>🕰️ heures</span></div>
    <div class="stat-pill d-pill"><strong>${fmt(Math.floor(ageMs/864e5))}</strong><span>📅 jours</span></div>
    <div class="stat-pill w-pill"><strong>${fmt(Math.floor(ageMs/6048e5))}</strong><span>📆 semaines</span></div>
  `;

  // ── Profil astral ──
  const birthMonth = birth.getMonth() + 1;
  const birthDay   = birth.getDate();
  const zodiac  = getZodiacSign(birthMonth, birthDay);
  const moon    = getMoonPhase(birth);
  const chinese = getChineseZodiac(birth);
  const astroDescription = generateAstralDescription(zodiac.name, moon.moonSign.name, chinese.name);
  document.getElementById('astro-section').innerHTML = `
    <h2 class="section-head">🔮 Ton profil astral</h2>
    <div class="astro-box">
      <div class="astro-card western">
        <div class="astro-emoji">${zodiac.emoji}</div>
        <div class="astro-type">Signe occidental</div>
        <div class="astro-name">${zodiac.name}</div>
        <div class="astro-sub">Zodiaque tropical</div>
      </div>
      <div class="astro-card moon">
        <div class="astro-emoji">${moon.phaseEmoji} ${moon.moonSign.emoji}</div>
        <div class="astro-type">Signe lunaire</div>
        <div class="astro-name">Lune en ${moon.moonSign.name}</div>
        <div class="astro-sub">${moon.phaseName} à ta naissance</div>
      </div>
      <div class="astro-card chinese">
        <div class="astro-emoji">${chinese.emoji}</div>
        <div class="astro-type">Zodiaque chinois</div>
        <div class="astro-name">${chinese.name}</div>
        <div class="astro-sub">Élément : ${chinese.element} · ${chinese.year}</div>
      </div>
    </div>
    <button class="astro-profile-btn" id="astro-profile-btn" onclick="toggleAstralProfile()">
      <span id="astro-profile-btn-label">🔮 En savoir plus sur mon profil astral</span>
    </button>
    <div class="astro-profile-panel" id="astro-profile-panel">
      <div class="astro-profile-inner">
        <div class="astro-profile-header">
          <div class="astro-profile-sigils">${zodiac.emoji} ${moon.moonSign.emoji} ${chinese.emoji}</div>
          <div>
            <div class="astro-profile-title">${zodiac.name} · Lune en ${moon.moonSign.name} · ${chinese.name}</div>
            <div class="astro-profile-subtitle">Analyse astrologique non certifiée par les étoiles</div>
          </div>
        </div>
        <div class="astro-profile-body">
          ${astroDescription}
        </div>
        <div class="astro-profile-disclaimer">
          * Ceci est de l'astrologie de magazine. Les astres déclinent toute responsabilité.
        </div>
      </div>
    </div>
  `;

  // ── Calendriers alternatifs ──
  const y = birth.getFullYear(), mo = birth.getMonth() + 1, da = birth.getDate();
  const hijri    = jdToHijri(gregorianToJD(y, mo, da));
  const french   = gregorianToFrenchRevolutionary(y, mo, da);
  const ethiopian = gregorianToEthiopian(y, mo, da);
  const jalali   = gregorianToJalali(y, mo, da);
  const julian   = gregorianToJulian(y, mo, da);
  document.getElementById('calendars-section').innerHTML = `
    <h2 class="section-head">🗓️ Ta naissance dans d'autres calendriers</h2>
    <div class="calendars-grid">
      <div class="cal-card">
        <div class="cal-flag">☪️</div>
        <div class="cal-body">
          <div class="cal-type">Calendrier Hijri</div>
          <div class="cal-date">${hijri.day} ${hijri.monthName} ${hijri.year} H</div>
          <div class="cal-note">Calendrier lunaire islamique</div>
        </div>
      </div>
      <div class="cal-card">
        <div class="cal-flag">🇫🇷</div>
        <div class="cal-body">
          <div class="cal-type">Calendrier Républicain</div>
          <div class="cal-date">${french.display}</div>
          <div class="cal-note">Révolution française · An I = 1792</div>
        </div>
      </div>
      <div class="cal-card">
        <div class="cal-flag">🇪🇹</div>
        <div class="cal-body">
          <div class="cal-type">Calendrier Éthiopien</div>
          <div class="cal-date">${ethiopian.display}</div>
          <div class="cal-note">7-8 ans de décalage avec le grégorien</div>
        </div>
      </div>
      <div class="cal-card">
        <div class="cal-flag">🇮🇷</div>
        <div class="cal-body">
          <div class="cal-type">Calendrier Persan (Jalali)</div>
          <div class="cal-date">${jalali.display}</div>
          <div class="cal-note">Le calendrier solaire le plus précis</div>
        </div>
      </div>
      <div class="cal-card">
        <div class="cal-flag">🏛️</div>
        <div class="cal-body">
          <div class="cal-type">Calendrier Julien</div>
          <div class="cal-date">${julian.display}</div>
          <div class="cal-note">13 jours de décalage (actuel)</div>
        </div>
      </div>
    </div>
  `;

  // ── ICS all ──
  document.getElementById('ics-all-btn').textContent =
    `📅 Ajouter mes ${Math.min(future.length, 10)} prochains milestones au calendrier`;
  document.getElementById('ics-all-btn').onclick = () =>
    downloadICS(future.slice(0,10).map(x => ({ m: x.m, date: x.date })));

  // ── Future cards ──
  const fSec = document.getElementById('future-section');
  fSec.innerHTML = future.length ? `
    <h2 class="section-head">⏳ Prochains milestones (${future.length})</h2>
    <div class="grid">${future.map((x,i) => renderFutureCard(x, i===0)).join('')}</div>
  ` : '';

  // ── Past cards ──
  const pSec = document.getElementById('past-section');
  pSec.innerHTML = past.length ? `
    <h2 class="section-head">🏅 Milestones accomplis (${past.length})</h2>
    <div class="grid">${past.map((x, i) => renderPastCard(x, i)).join('')}</div>
  ` : '';

  // show
  const res = document.getElementById('results');
  res.classList.add('show');
  setTimeout(() => res.scrollIntoView({ behavior:'smooth', block:'start' }), 80);

  // ── Live countdowns ──
  future.forEach(item => {
    const el = document.getElementById(`cd-${item.idx}`);
    if (!el) return;
    const tick = () => {
      const d = item.date - new Date();
      el.textContent = fmtCountdown(d);
      el.classList.toggle('hot', d > 0 && d < 864e5 * 7);
    };
    tick();
    intervals.push(setInterval(tick, 1000));
  });

  // ── Live seconds counter ──
  intervals.push(setInterval(() => {
    const el = document.getElementById('live-s');
    if (!el) return;
    el.textContent = fmt(Math.floor((new Date() - birth) / 1e3));
  }, 1000));

  confetti();
}

// Set max date to today
document.getElementById('bd').max = new Date().toISOString().split('T')[0];

// Allow Enter key
document.getElementById('bd').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
